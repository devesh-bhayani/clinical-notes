# ORPO Training Configuration
# Data paths sourced from .env via python-dotenv

model:
  name: "BioMistral/BioMistral-7B"
  quantization:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "bfloat16"
    bnb_4bit_use_double_quant: true

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  task_type: "CAUSAL_LM"

training:
  orpo_beta: 0.1
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  max_length: 2048
  logging_steps: 10
  save_strategy: "steps"
  save_steps: 200
  eval_strategy: "steps"
  eval_steps: 200
  save_total_limit: 3
  bf16: true
  report_to: "wandb"

data:
  # Actual paths loaded from .env at runtime
  train_file: "${SPLITS_DIR}/train_orpo.jsonl"
  val_file: "${SPLITS_DIR}/val.jsonl"
  test_file: "${SPLITS_DIR}/test.jsonl"

output:
  output_dir: "models/checkpoints"
  logging_dir: "logs"
